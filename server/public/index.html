<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDA AKE - Web Komuta Merkezi</title>
    <style>
        :root {
            --bg-color: #080c14;
            --surface-color: #0f1520;
            --panel-color: #141c2b;
            --border-color: #1e2d42;
            --cyan: #00e5ff;
            --orange: #ff6b35;
            --red: #ff3b30;
            --green: #00e676;
            --text-main: #e8ecf2;
            --text-muted: #6b7d95;
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Login Screen */
        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .login-box {
            background: var(--surface-color);
            padding: 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.05);
        }

        .login-box h1 {
            color: var(--cyan);
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .login-box p {
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: var(--font-family);
            box-sizing: border-box;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            border-color: var(--cyan);
        }

        button {
            width: 100%;
            padding: 14px;
            background: rgba(0, 229, 255, 0.15);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-family: var(--font-family);
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--cyan);
            color: var(--bg-color);
        }

        /* Dashboard */
        #dashboard {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        header {
            background: var(--surface-color);
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            margin: 0;
            color: var(--cyan);
            letter-spacing: 2px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 14px;
        }

        .logout-btn {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 8px 15px;
            width: auto;
        }

        .logout-btn:hover {
            background: var(--red);
            color: white;
        }

        .content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .panel {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            color: var(--orange);
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .users-panel {
            flex: 2;
        }

        .action-panel {
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-size: 12px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge.merkez { background: rgba(255, 107, 53, 0.2); color: var(--orange); }
        .badge.il_baskani { background: rgba(0, 229, 255, 0.2); color: var(--cyan); }
        .badge.rescuer { background: rgba(107, 125, 149, 0.2); color: var(--text-muted); }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
        }

        .btn-danger {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
        }

        .btn-danger:hover {
            background: var(--red);
            color: white;
        }

        .alarm-btn {
            background: rgba(255, 59, 48, 0.15);
            border: 1px solid var(--red);
            color: var(--red);
            font-size: 18px;
            padding: 20px;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }

        .alarm-btn:hover {
            background: var(--red);
            color: white;
            animation: none;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: var(--font-family);
            border-radius: 4px;
            outline: none;
        }

    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h1>ANDA AKE</h1>
            <p>WEB KOMUTA MERKEZİ</p>
            <p id="login-error" style="color: var(--red); display: none;"></p>
            <input type="email" id="email" placeholder="E-Posta" />
            <input type="password" id="password" placeholder="Şifre" />
            <button onclick="login()">SİSTEME BAĞLAN</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <header>
            <h2>K2 TERMİNALİ</h2>
            <div class="user-info">
                <span id="user-name"></span>
                <span id="user-role" class="badge merkez"></span>
                <button class="logout-btn" onclick="logout()">ÇIKIŞ YAP</button>
            </div>
        </header>

        <div class="content">
            <!-- Users Panel -->
            <div class="panel users-panel">
                <div class="panel-header">
                    <span>PERSONEL LİSTESİ</span>
                    <button class="btn-small" onclick="fetchUsers()">YENİLE</button>
                </div>
                <div style="overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>İSİM SOYİSİM</th>
                                <th>E-POSTA</th>
                                <th>ROL</th>
                                <th>İL</th>
                                <th>İŞLEM</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- Users injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Action Panel -->
            <div class="panel action-panel">
                <div class="panel-header">YENİ PERSONEL EKLE</div>
                <div class="form-group">
                    <label>İsim Soyisim</label>
                    <input type="text" id="new-name" />
                </div>
                <div class="form-group">
                    <label>E-Posta</label>
                    <input type="email" id="new-email" />
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="new-password" />
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select id="new-role">
                        <option value="RESCUER">RESCUER (Kurtarıcı)</option>
                        <option value="IL_BASKANI">IL_BASKANI</option>
                        <option value="MERKEZ">MERKEZ (Tam Yetki)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>İl (Örn: ANKARA)</label>
                    <input type="text" id="new-province" />
                </div>
                <button onclick="addUser()">PERSONELİ KAYDET</button>

                <div style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                    <div class="panel-header" style="color: var(--red);">KIRMIZI ALARM (CANLI)</div>
                    <button class="alarm-btn" onclick="triggerAlarm()">BİRLİKLERE ALARM GÖNDER</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let jwtToken = localStorage.getItem('jwt_token');
        let currentUser = null;

        // Init
        if (jwtToken) {
            fetchMe();
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const err = document.getElementById('login-error');
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    jwtToken = data.token;
                    localStorage.setItem('jwt_token', jwtToken);
                    err.style.display = 'none';
                    fetchMe();
                } else {
                    err.innerText = data.error;
                    err.style.display = 'block';
                }
            } catch (e) {
                err.innerText = "Bağlantı hatası.";
                err.style.display = 'block';
            }
        }

        async function fetchMe() {
            try {
                const res = await fetch('/api/me', {
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });
                const data = await res.json();
                if (data.success) {
                    currentUser = data.user;
                    showDashboard();
                } else {
                    logout();
                }
            } catch (e) {
                logout();
            }
        }

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            
            document.getElementById('user-name').innerText = currentUser.name.toUpperCase();
            const roleBadge = document.getElementById('user-role');
            roleBadge.innerText = currentUser.role;
            roleBadge.className = `badge ${currentUser.role.toLowerCase()}`;

            if (currentUser.role === 'RESCUER') {
                document.querySelector('.action-panel').style.display = 'none';
            }

            fetchUsers();
        }

        function logout() {
            jwtToken = null;
            currentUser = null;
            localStorage.removeItem('jwt_token');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        async function fetchUsers() {
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '<tr><td colspan="5">Yükleniyor...</td></tr>';
            
            try {
                const res = await fetch('/api/users', {
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });
                const data = await res.json();
                
                if (data.success) {
                    tbody.innerHTML = '';
                    data.users.forEach(u => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${u.name}</td>
                                <td>${u.email}</td>
                                <td><span class="badge ${u.role.toLowerCase()}">${u.role}</span></td>
                                <td>${u.province || '-'}</td>
                                <td>
                                    <button class="btn-small btn-danger" onclick="deleteUser('${u.id}')">SİL</button>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="5" style="color:var(--red)">Yetki hatası veya bulunamadı.</td></tr>`;
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="5">Bağlantı hatası.</td></tr>`;
            }
        }

        async function addUser() {
            const name = document.getElementById('new-name').value;
            const email = document.getElementById('new-email').value;
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;
            const province = document.getElementById('new-province').value;

            try {
                const res = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${jwtToken}`
                    },
                    body: JSON.stringify({ name, email, password, role, province })
                });
                const data = await res.json();
                if (data.success) {
                    alert('Personel başarıyla eklendi.');
                    fetchUsers();
                } else {
                    alert('Hata: ' + data.error);
                }
            } catch (e) {
                alert('Bağlantı hatası.');
            }
        }

        async function deleteUser(id) {
            if (!confirm("Bu personeli silmek istediğinize emin misiniz?")) return;
            try {
                const res = await fetch(`/api/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });
                const data = await res.json();
                if (data.success) {
                    fetchUsers();
                } else {
                    alert('Hata: ' + data.error);
                }
            } catch (e) {
                alert('Bağlantı hatası.');
            }
        }

        async function triggerAlarm() {
            if (!confirm("TÜM BİRLİKLERE KIRMIZI ALARM GÖNDERİLECEK! ONAYLIYOR MUSUNUZ?")) return;
            
            try {
                const res = await fetch('/api/trigger-alarm', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${jwtToken}`
                    },
                    body: JSON.stringify({
                        title: 'KIRMIZI ALARM: ACİL İNTİKAL (WEB)',
                        body: 'Web Komuta Merkezi üzerinden acil toplanma çağrısı yapılmıştır.',
                        priority: 'critical'
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert('ALARM BAŞARIYLA İLETİLDİ!');
                } else {
                    alert('ALARM İLETİLEMEDİ: ' + data.error);
                }
            } catch (e) {
                alert('Bağlantı hatası.');
            }
        }
    </script>
</body>
</html>
